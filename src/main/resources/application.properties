# --- Serveur ---
server.port=8080

# --- Base de donnÕes PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/helpdesk_db
spring.datasource.username=postgres
spring.datasource.password=Decot_tignies44
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# "update" : met Á jour le schÕma sans supprimer les donnÕes
# Utiliser "create-drop" en dÕveloppement pour repartir de zÕro
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# --- SendGrid (API externe notifications email) ---
# Remplace par ta vraie clÕ API SendGrid
sendgrid.api-key=SG.XXXXXXXXXXXXXXXXXXXX
sendgrid.from-email=noreply@techcorp.com
sendgrid.from-name=Helpdesk TechCorp

# --- Spring Security ---
# DÕsactive la page de login par dÕfaut (on fournit la n¶tre)
spring.security.user.name=admin
spring.security.user.password=admin123

# --- Logs ---
logging.level.org.springframework=INFO
logging.level.com.techcorp.helpdesk=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Gestion des erreurs ---
server.error.include-message=always
server.error.include-binding-errors=always

# --- Encoding ---
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true