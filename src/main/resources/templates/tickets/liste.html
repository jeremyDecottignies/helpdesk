<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tickets — Helpdesk TechCorp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
        .nav-brand { font-size: 18px; font-weight: bold; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 20px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn:hover { opacity: 0.85; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .search-bar button { padding: 9px 18px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #d4edda; color: #155724; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background: #f8f9fa; }
        a.row-link { color: #2c3e50; text-decoration: none; font-weight: bold; }
        a.row-link:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-OUVERT     { background: #d1ecf1; color: #0c5460; }
        .badge-EN_COURS   { background: #fff3cd; color: #856404; }
        .badge-EN_ATTENTE { background: #e2d9f3; color: #4a235a; }
        .badge-RESOLU     { background: #d4edda; color: #155724; }
        .badge-FERME      { background: #e2e3e5; color: #495057; }
        .badge-URGENTE    { background: #f8d7da; color: #721c24; }
        .badge-HAUTE      { background: #fff3cd; color: #856404; }
        .badge-NORMALE    { background: #d1ecf1; color: #0c5460; }
        .badge-FAIBLE     { background: #e2e3e5; color: #495057; }
        .empty { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<nav>
    <span class="nav-brand">Helpdesk TechCorp</span>
    <div>
        <a th:href="@{/tickets}">Tickets</a>
        <a th:href="@{/tickets/nouveau}">Nouveau ticket</a>
        <a th:href="@{/utilisateurs}" sec:authorize="hasRole('ADMIN')">Utilisateurs</a>
        <a th:href="@{/logout}">Déconnexion</a>
    </div>
</nav>

<div class="container">

    <div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>

    <div class="top-bar">
        <h2>Tous les tickets</h2>
        <a th:href="@{/tickets/nouveau}" class="btn btn-primary">+ Nouveau ticket</a>
    </div>

    <div class="card">
        <form th:action="@{/tickets}" method="get" class="search-bar">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Rechercher un ticket..."/>
            <button type="submit">Rechercher</button>
        </form>

        <div th:if="${tickets.empty}" class="empty">
            <p>Aucun ticket trouvé.</p>
        </div>

        <table th:if="${!tickets.empty}">
            <thead>
            <tr>
                <th>#</th>
                <th>Titre</th>
                <th>Statut</th>
                <th>Priorité</th>
                <th>Créateur</th>
                <th>Technicien</th>
                <th>Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}"></td>
                <td>
                    <a class="row-link"
                       th:href="@{/tickets/{id}(id=${ticket.id})}"
                       th:text="${ticket.titre}"></a>
                </td>
                <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${ticket.statut}"
                              th:text="${ticket.statut}"></span>
                </td>
                <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${ticket.priorite}"
                              th:text="${ticket.priorite}"></span>
                </td>
                <td th:text="${ticket.createurNom}"></td>
                <td th:text="${ticket.technicienNom} ?: 'Non assigné'"></td>
                <td th:text="${#temporals.format(ticket.dateCreation, 'dd/MM/yyyy')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
