<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="'Ticket #' + ${ticket.id} + ' — Helpdesk'">Ticket</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
        .nav-brand { font-size: 18px; font-weight: bold; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h2 { font-size: 20px; color: #2c3e50; margin-bottom: 16px; }
        h3 { font-size: 16px; color: #2c3e50; margin-bottom: 12px; }
        .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .meta-item label { font-size: 12px; color: #888; display: block; margin-bottom: 2px; }
        .meta-item span  { font-size: 14px; font-weight: bold; }
        .description { background: #f8f9fa; border-radius: 6px; padding: 16px; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.85; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #d4edda; color: #155724; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-OUVERT     { background: #d1ecf1; color: #0c5460; }
        .badge-EN_COURS   { background: #fff3cd; color: #856404; }
        .badge-EN_ATTENTE { background: #e2d9f3; color: #4a235a; }
        .badge-RESOLU     { background: #d4edda; color: #155724; }
        .badge-FERME      { background: #e2e3e5; color: #495057; }
        .commentaire { border-left: 3px solid #ddd; padding: 10px 14px; margin-bottom: 12px; }
        .commentaire .auteur { font-size: 13px; font-weight: bold; color: #2c3e50; }
        .commentaire .date   { font-size: 12px; color: #888; margin-left: 8px; }
        .commentaire .texte  { font-size: 14px; margin-top: 6px; line-height: 1.5; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; height: 90px; resize: vertical; }
        a.back { color: #2c3e50; font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 16px; }
        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <span class="nav-brand">Helpdesk TechCorp</span>
    <div>
        <a th:href="@{/tickets}">Tickets</a>
        <a th:href="@{/tickets/nouveau}">Nouveau ticket</a>
        <a th:href="@{/utilisateurs}" sec:authorize="hasRole('ADMIN')">Utilisateurs</a>
        <a th:href="@{/logout}">Déconnexion</a>
    </div>
</nav>

<div class="container">

    <a th:href="@{/tickets}" class="back">← Retour à la liste</a>

    <div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>

    <div class="card">
        <h2 th:text="'#' + ${ticket.id} + ' — ' + ${ticket.titre}"></h2>

        <div class="meta">
            <div class="meta-item">
                <label>Statut</label>
                <span class="badge" th:classappend="'badge-' + ${ticket.statut}" th:text="${ticket.statut}"></span>
            </div>
            <div class="meta-item">
                <label>Priorité</label>
                <span th:text="${ticket.priorite}"></span>
            </div>
            <div class="meta-item">
                <label>Créé par</label>
                <span th:text="${ticket.createurNom}"></span>
            </div>
            <div class="meta-item">
                <label>Technicien</label>
                <span th:text="${ticket.technicienNom} ?: 'Non assigné'"></span>
            </div>
            <div class="meta-item">
                <label>Créé le</label>
                <span th:text="${#temporals.format(ticket.dateCreation, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="meta-item">
                <label>Mis à jour le</label>
                <span th:text="${#temporals.format(ticket.dateMaj, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
        </div>

        <div class="description" th:text="${ticket.description}"></div>

        <!-- Actions technicien / admin -->
        <div class="actions">

            <form th:action="@{/tickets/{id}/statut(id=${ticket.id})}" method="post"
                  sec:authorize="hasAnyRole('TECHNICIEN','ADMIN')" style="display:flex;gap:8px">
                <select name="statut">
                    <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}"
                            th:selected="${s == ticket.statut}"></option>
                </select>
                <button type="submit" class="btn btn-success">Changer statut</button>
            </form>

            <form th:action="@{/tickets/{id}/assigner(id=${ticket.id})}" method="post"
                  sec:authorize="hasAnyRole('TECHNICIEN','ADMIN')" style="display:flex;gap:8px">
                <select name="technicienId">
                    <option value="">-- Choisir un technicien --</option>
                    <option th:each="t : ${techniciens}"
                            th:value="${t.id}" th:text="${t.nom}"
                            th:selected="${t.id == ticket.technicienId}"></option>
                </select>
                <button type="submit" class="btn btn-primary">Assigner</button>
            </form>

            <form th:action="@{/tickets/{id}/supprimer(id=${ticket.id})}" method="post"
                  sec:authorize="hasRole('ADMIN')"
                  onsubmit="return confirm('Supprimer ce ticket ?')">
                <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>

        </div>
    </div>

    <!-- Commentaires -->
    <div class="card">
        <h3>Commentaires (<span th:text="${ticket.nombreCommentaires}">0</span>)</h3>

        <div th:if="${ticket.nombreCommentaires == 0}" style="color:#888;font-size:14px;margin-bottom:16px">
            Aucun commentaire pour l'instant.
        </div>

        <form th:action="@{/tickets/{id}/commentaires(id=${ticket.id})}" method="post">
            <textarea name="contenu" placeholder="Ajouter un commentaire..." required></textarea>
            <button type="submit" class="btn btn-primary" style="margin-top:10px">Envoyer</button>
        </form>
    </div>

</div>
</body>
</html>
