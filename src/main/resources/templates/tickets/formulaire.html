<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau ticket — Helpdesk TechCorp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
        .nav-brand { font-size: 18px; font-weight: bold; }
        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h2 { font-size: 20px; color: #2c3e50; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2c3e50; }
        textarea { height: 140px; resize: vertical; }
        .error-msg { color: #e74c3c; font-size: 12px; margin-top: 4px; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-secondary { background: #ddd; color: #333; }
        .btn:hover { opacity: 0.85; }
        a.back { color: #2c3e50; font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 16px; }
        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <span class="nav-brand">Helpdesk TechCorp</span>
    <div>
        <a th:href="@{/tickets}">Tickets</a>
        <a th:href="@{/logout}">Déconnexion</a>
    </div>
</nav>

<div class="container">

    <a th:href="@{/tickets}" class="back">← Retour à la liste</a>

    <div class="card">
        <h2>Nouveau ticket</h2>

        <form th:action="@{/tickets/nouveau}" th:object="${ticketDTO}" method="post">

            <div class="form-group">
                <label for="titre">Titre *</label>
                <input type="text" id="titre" th:field="*{titre}"
                       placeholder="Ex : Impossible d'accéder à l'imprimante réseau"/>
                <span class="error-msg" th:if="${#fields.hasErrors('titre')}"
                      th:errors="*{titre}"></span>
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" th:field="*{description}"
                          placeholder="Décrivez le problème en détail..."></textarea>
                <span class="error-msg" th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"></span>
            </div>

            <div class="form-group">
                <label for="priorite">Priorité *</label>
                <select id="priorite" th:field="*{priorite}">
                    <option value="">-- Choisir une priorité --</option>
                    <option th:each="p : ${priorites}" th:value="${p}" th:text="${p}"></option>
                </select>
                <span class="error-msg" th:if="${#fields.hasErrors('priorite')}"
                      th:errors="*{priorite}"></span>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Créer le ticket</button>
                <a th:href="@{/tickets}" class="btn btn-secondary">Annuler</a>
            </div>

        </form>
    </div>
</div>
</body>
</html>
